apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: "Nomad Chaos"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 5
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
